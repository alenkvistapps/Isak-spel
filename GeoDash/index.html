<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>ISAKs GeoDash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
  canvas { border: 2px solid #333; display: block; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.75); }
  #overlay h1 { font-size: 3rem; color: #f5a623; text-shadow: 0 0 20px #f5a623; margin-bottom: 0.5rem; letter-spacing: 4px; }
  #overlay p { color: #aaa; margin: 0.3rem 0; font-size: 1rem; }
  #overlay .subtitle { font-size: 1.4rem; color: #fff; margin-bottom: 1.5rem; }
  #overlay button { margin-top: 1.5rem; padding: 0.8rem 2.5rem; font-size: 1.1rem; border: none; border-radius: 8px; background: #f5a623; color: #111; font-weight: bold; cursor: pointer; letter-spacing: 2px; transition: background 0.2s; pointer-events: all; }
  #overlay button:hover { background: #ffcc55; }
  #level-select { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.6rem; margin: 1rem 0; max-width: 600px; }
  #level-select button { padding: 0.6rem 1.4rem; font-size: 1rem; border: 2px solid #f5a623; border-radius: 8px; background: transparent; color: #f5a623; cursor: pointer; transition: all 0.2s; pointer-events: all; }
  #level-select button:hover, #level-select button.active { background: #f5a623; color: #111; }
  #hud { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 2rem; font-size: 1rem; color: #fff; }
  #progress-bar-wrap { position: absolute; top: 8px; left: 10%; width: 80%; height: 8px; background: #333; border-radius: 4px; }
  #progress-bar { height: 100%; width: 0%; background: #f5a623; border-radius: 4px; transition: width 0.1s; }
  #percent { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 0.85rem; color: #aaa; }
</style>
</head>

// ── Audio ──────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, dur, vol = 0.15) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}
function sfxJump()   { playTone(520, 'square', 0.12, 0.1); }
function sfxDeath()  { playTone(120, 'sawtooth', 0.4, 0.2); playTone(80, 'sawtooth', 0.6, 0.15); }
function sfxWin()    { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.3,0.15), i*120)); }
function sfxPortal() { [400,600,900].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.2,0.12), i*80)); }

// Types: 'spike' (ground), 'cspike' (ceiling), 'platform', 'mover' (moving block)
function planeSection(startX, count, gap, hard) {
  const obs = [];
  let x = startX;
  for (let i = 0; i < count; i++) {
    const r = Math.random();
    if (hard && r < 0.35) {
      obs.push({type:'spike', x}, {type:'cspike', x});
    } else if (r < 0.45) {
      obs.push({type:'spike', x});
    } else if (r < 0.9) {
      obs.push({type:'cspike', x});
    } else {
      obs.push({type:'spike', x}, {type:'cspike', x});
    }
    x += gap + Math.floor(Math.random() * 80);
  }
  return obs;
}

// ── Game state ─────────────────────────────────────────────────────────
let levels, currentLevel, state; // 'menu','playing','dead','win'
let player, camera, objects, particles;
let spaceDown = false, lastJumpTime = 0, jumpHeld = false;
let attempts = 0;

function initLevel(idx) {
  currentLevel = idx;
  levels = makeLevels();
  const lvl = levels[idx];
  player = { x: 100, y: GROUND - TILE, w: TILE, h: TILE, vy: 0, onGround: false, onPlatform: false, angle: 0, mode: 'cube' };
  camera = { x: 0 };
  particles = [];
  // Instantiate objects with mover state
  objects = lvl.objects.map(o => ({
    ...o,
    _y: o.y ?? 0,
    _dir: 1,
    _min: o.y ? o.y - 80 : 0,
    _max: o.y ? o.y + 80 : 0,
  }));
  state = 'playing';
  attempts++;
  spaceDown = false;
  lastJumpTime = 0;
}

// ── Input ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (AC.state === 'suspended') AC.resume();
    if (!spaceDown) {
      spaceDown = true;
      tryJump();
    }
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { spaceDown = false; lastJumpTime = 0; }
});
canvas.addEventListener('pointerdown', () => {
  if (AC.state === 'suspended') AC.resume();
  if (!spaceDown) { spaceDown = true; tryJump(); }
});
canvas.addEventListener('pointerup', () => { spaceDown = false; lastJumpTime = 0; });

function tryJump() {
  if (state !== 'playing') return;
  if (player.mode === 'cube' && (player.onGround || player.onPlatform)) {
    doJump();
  }
}

function doJump() {
  player.vy = JUMP_FORCE;
  player.onGround = false;
  player.onPlatform = false;
  lastJumpTime = performance.now();
  sfxJump();
}

// ── Geometry helpers ───────────────────────────────────────────────────
function spikeVerts(x, y) {
  // Ground spike: triangle pointing up, base on ground
  return [{x: x, y: GROUND}, {x: x + TILE/2, y: GROUND - TILE}, {x: x + TILE, y: GROUND}];
}
function cspikeVerts(x) {
  const top = 60;
  return [{x: x, y: top}, {x: x + TILE/2, y: top + TILE}, {x: x + TILE, y: top}];
}
function playerVerts(p) {
  const cx = p.x + p.w/2, cy = p.y + p.h/2;
  const hw = p.w/2, hh = p.h/2;
  const a = p.angle;
  const cos = Math.cos(a), sin = Math.sin(a);
  const corners = [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]];
  return corners.map(([lx,ly]) => ({
    x: cx + lx*cos - ly*sin,
    y: cy + lx*sin + ly*cos,
  }));
}

function pointInTriangle(px, py, v) {
  function sign(p1x,p1y,p2x,p2y,p3x,p3y) {
    return (p1x-p3x)*(p2y-p3y)-(p2x-p3x)*(p1y-p3y);
  }
  const d1=sign(px,py,v[0].x,v[0].y,v[1].x,v[1].y);
  const d2=sign(px,py,v[1].x,v[1].y,v[2].x,v[2].y);
  const d3=sign(px,py,v[2].x,v[2].y,v[0].x,v[0].y);
  const hasNeg=(d1<0)||(d2<0)||(d3<0);
  const hasPos=(d1>0)||(d2>0)||(d3>0);
  return !(hasNeg&&hasPos);
}

function playerHitsSpike(p, verts) {
  const pv = playerVerts(p);
  return pv.some(pt => pointInTriangle(pt.x, pt.y, verts));
}

function playerHitsCspike(p, verts) {
  const pv = playerVerts(p);
  return pv.some(pt => pointInTriangle(pt.x, pt.y, verts));
}

function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ── Particles ──────────────────────────────────────────────────────────
function spawnParticles(x, y) {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 2,
      life: 1, decay: 0.03 + Math.random()*0.03,
      r: 4 + Math.random()*6,
      color: ['#f5a623','#ff6b6b','#fff','#ffd166'][Math.floor(Math.random()*4)]
    });
  }
}

// ── Update ─────────────────────────────────────────────────────────────
let lastTime = 0;
function update(ts) {
  if (state !== 'playing') return;
  const dt = Math.min(ts - lastTime, 32);
  lastTime = ts;

  const lvl = levels[currentLevel];

  if (player.mode === 'cube') {
    // Auto-jump while holding space
    if (spaceDown && (player.onGround || player.onPlatform)) {
      const now = performance.now();
      if (now - lastJumpTime > JUMP_INTERVAL) doJump();
    }
    player.vy += GRAVITY;
    player.y += player.vy;
    player.x += SPEED;
    player.onGround = false;
    player.onPlatform = false;
    if (player.y + player.h >= GROUND) { player.y = GROUND - player.h; player.vy = 0; player.onGround = true; }
    if (player.y <= 60) { player.y = 60; player.vy = Math.abs(player.vy); }
    if (!player.onGround && !player.onPlatform) { player.angle += 0.08; }
    else { player.angle = Math.round(player.angle / (Math.PI/2)) * (Math.PI/2); }
  } else {
    // Plane mode — space = thrust up
    if (spaceDown) player.vy = Math.max(player.vy - THRUST, -MAX_VY_PLANE);
    player.vy = Math.min(player.vy + GRAVITY_PLANE, MAX_VY_PLANE);
    player.y += player.vy;
    player.x += SPEED;
    player.onGround = false;
    player.onPlatform = false;
    player.angle = Math.atan2(player.vy, SPEED) * 0.45;
    if (player.y + player.h >= GROUND) { die(); return; }
    if (player.y <= 60) { die(); return; }
  }

  // Camera
  camera.x = player.x - W * 0.25;

  // Update movers
  for (const o of objects) {
    if (o.type === 'mover') {
      o._y += o.dy * o._dir;
      if (o._y <= o._min || o._y >= o._max) o._dir *= -1;
      o.y = o._y;
    }
  }

  // Collision with objects
  for (const o of objects) {
    const ox = o.x;
    if (o.type === 'portal') {
      const pcx = player.x + player.w / 2;
      if (pcx >= ox && pcx <= ox + 24 && o.toMode !== player.mode) {
        player.mode = o.toMode;
        player.vy = o.toMode === 'plane' ? -2 : 0;
        player.angle = 0;
        sfxPortal();
      }
      continue;
    }
    if (o.type === 'spike') {
      const verts = spikeVerts(ox, GROUND);
      if (playerHitsSpike(player, verts)) { die(); return; }
    } else if (o.type === 'cspike') {
      const verts = cspikeVerts(ox);
      if (playerHitsCspike(player, verts)) { die(); return; }
    } else if (o.type === 'platform') {
      if (player.mode === 'cube' && rectsOverlap(player.x, player.y, player.w, player.h, ox, o.y, o.w, o.h)) {
        const prevBottom = player.y + player.h - player.vy;
        if (prevBottom <= o.y + 4 && player.vy >= 0) {
          player.y = o.y - player.h; player.vy = 0; player.onPlatform = true;
        } else { die(); return; }
      }
    } else if (o.type === 'mover') {
      if (rectsOverlap(player.x, player.y, player.w, player.h, ox, o.y, o.w, o.h)) {
        const prevBottom = player.y + player.h - player.vy;
        if (prevBottom <= o.y + 6 && player.vy >= 0) {
          player.y = o.y - player.h; player.vy = 0; player.onPlatform = true;
        } else { die(); return; }
      }
    }
  }

  // Update particles
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay; }
  particles = particles.filter(p => p.life > 0);

  // Progress
  const pct = Math.min(100, Math.floor((player.x / lvl.length) * 100));
  progressBar.style.width = pct + '%';
  percentEl.textContent = pct + '%';

  // Win
  if (player.x >= lvl.length) {
    state = 'win';
    sfxWin();
    showOverlay('win');
  }
}

function die() {
  spawnParticles(player.x - camera.x + player.w/2, player.y + player.h/2);
  sfxDeath();
  state = 'dead';
  setTimeout(() => { initLevel(currentLevel); }, 800);
}

// ── Draw ───────────────────────────────────────────────────────────────
function draw(ts) {
  if (state === 'menu') return;
  const lvl = levels[currentLevel];

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, lvl.bgTop);
  grad.addColorStop(1, lvl.bgBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 137 + camera.x * 0.1) % W + W) % W;
    const sy = (i * 73) % (H - 100);
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  ctx.save();
  ctx.translate(-camera.x, 0);

  // Ground
  ctx.fillStyle = lvl.groundColor;
  ctx.fillRect(camera.x, GROUND, W, H - GROUND);
  // Ground line
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(camera.x, GROUND, W, 3);

  // Ceiling bar
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(camera.x, 57, W, 3);

  // Objects
  for (const o of objects) {
    const sx = o.x - camera.x;
    if (sx < -100 || sx > W + 100) continue; // cull

    if (o.type === 'spike') {
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.moveTo(o.x, GROUND);
      ctx.lineTo(o.x + TILE/2, GROUND - TILE);
      ctx.lineTo(o.x + TILE, GROUND);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    } else if (o.type === 'cspike') {
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.moveTo(o.x, 60);
      ctx.lineTo(o.x + TILE/2, 60 + TILE);
      ctx.lineTo(o.x + TILE, 60);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    } else if (o.type === 'platform') {
      ctx.fillStyle = '#52b788';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = '#74c69d';
      ctx.fillRect(o.x, o.y, o.w, 4);
    } else if (o.type === 'mover') {
      ctx.fillStyle = '#e63946';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = '#ff6b6b';
      ctx.fillRect(o.x+2, o.y+2, o.w-4, 5);
    } else if (o.type === 'portal') {
      const pc = o.toMode === 'plane' ? '#00d4ff' : '#f5a623';
      const t = Date.now() / 600;
      ctx.save();
      ctx.shadowColor = pc; ctx.shadowBlur = 18 + Math.sin(t)*6;
      ctx.fillStyle = pc + '55';
      ctx.fillRect(o.x, 60, 24, GROUND - 60);
      ctx.fillStyle = pc;
      ctx.fillRect(o.x, 60, 4, GROUND - 60);
      ctx.fillRect(o.x + 20, 60, 4, GROUND - 60);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px serif';
      ctx.textAlign = 'center';
      ctx.fillText(o.toMode === 'plane' ? '✈' : '◼', o.x + 12, GROUND/2 + 40);
      ctx.textAlign = 'left';
      ctx.restore();
    }
  }

  // Player
  if (state === 'playing') {
    const cx = player.x + player.w/2, cy = player.y + player.h/2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(player.angle);
    if (player.mode === 'cube') {
      ctx.shadowColor = '#f5a623'; ctx.shadowBlur = 15;
      const hw = player.w/2, hh = player.h/2;
      ctx.fillStyle = '#f5a623';
      ctx.fillRect(-hw, -hh, player.w, player.h);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff3';
      ctx.fillRect(-hw+5, -hh+5, player.w-10, player.h-10);
      ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 2;
      ctx.strokeRect(-hw, -hh, player.w, player.h);
    } else {
      // Plane
      ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 18;
      ctx.fillStyle = '#00d4ff';
      ctx.beginPath();
      ctx.moveTo(22, 0);
      ctx.lineTo(-14, -11);
      ctx.lineTo(-8, 0);
      ctx.lineTo(-14, 11);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffffff88';
      ctx.beginPath();
      ctx.ellipse(7, 0, 7, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#00d4ff99';
      ctx.beginPath();
      ctx.moveTo(-8, 0); ctx.lineTo(-20, -5); ctx.lineTo(-16, 0); ctx.lineTo(-20, 5); ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  ctx.restore();

  // Particles (screen space)
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x + camera.x - camera.x, p.y, p.r * p.life, 0, Math.PI*2);
    // Particles are already in screen space from spawnParticles
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Attempts HUD
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '14px Segoe UI';
  ctx.fillText(`Försök: ${attempts}`, 12, H - 10);
}

// ── Draw particles in screen space fix ────────────────────────────────
// (particles stored as screen coords, recalculate on spawn)
const _origSpawn = spawnParticles;
// Override so particles use screen space
function spawnParticlesScreen(sx, sy) {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x: sx, y: sy,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 2,
      life: 1, decay: 0.03 + Math.random()*0.03,
      r: 4 + Math.random()*6,
      color: ['#f5a623','#ff6b6b','#fff','#ffd166'][Math.floor(Math.random()*4)]
    });
  }
}

// ── Override die to use screen coords ─────────────────────────────────
function die() {
  const sx = player.x - camera.x + player.w/2;
  const sy = player.y + player.h/2;
  spawnParticlesScreen(sx, sy);
  sfxDeath();
  state = 'dead';
  setTimeout(() => { initLevel(currentLevel); }, 800);
}

        ${levels.map((_,i) => `<button data-level="${i}" class="${i===currentLevel?'active':''}">Nivå ${i+1}</button>`).join('')}
      </div>
      <button id="startBtn">SPELA IGEN</button>
    `;
    overlay.style.display = 'flex';
    bindOverlayButtons();
  }
}

function bindOverlayButtons() {
  document.getElementById('startBtn')?.addEventListener('click', () => {
    overlay.style.display = 'none';
    attempts = 0;
    initLevel(currentLevel);
  });
  document.querySelectorAll('[data-level]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-level]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLevel = parseInt(btn.dataset.level);
    });
  });
}

// ── Game loop ──────────────────────────────────────────────────────────
function loop(ts) {
  update(ts);
  draw(ts);
  requestAnimationFrame(loop);
}

// ── Init ───────────────────────────────────────────────────────────────
levels = makeLevels();
state = 'menu';
currentLevel = 0;
attempts = 0;

// Initial draw of menu background
(function drawMenuBg() {
  const lvl = levels[0];
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, lvl.bgTop);
  grad.addColorStop(1, lvl.bgBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
})();

bindOverlayButtons();

document.getElementById('startBtn').addEventListener('click', () => {
  overlay.style.display = 'none';
  attempts = 0;
  initLevel(currentLevel);
  requestAnimationFrame(loop);
}, { once: true });
</script>
</body>
